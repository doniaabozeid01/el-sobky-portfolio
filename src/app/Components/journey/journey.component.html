<section id="journey" class="path">
  <div class="container">
    <p class="section-label" appScrollReveal="from-bottom">05 — My Path</p>

    <div class="timeline">
      <div class="line" aria-hidden="true"></div>

      <article
        class="item"
        *ngFor="let item of timeline; let i = index"
        appScrollReveal="from-left"
        [revealDelay]="i * 45"
      >
        <div class="year">{{ item.year }}</div>
        <div class="dot" [class.edu]="item.type === 'edu'"></div>
        <div class="content">
          <div>
            <h3>{{ item.title }}</h3>
            <p class="place">{{ item.place }}</p>
          </div>
          <p class="note">{{ item.note }}</p>
        </div>
        <span class="badge" [class.edu]="item.type === 'edu'">
          {{ item.type === 'edu' ? 'Edu' : 'Work' }}
        </span>
      </article>
    </div>
  </div>
</section>
