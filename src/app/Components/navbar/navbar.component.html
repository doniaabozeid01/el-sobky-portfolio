<header class="nav" [class.scrolled]="isScrolled">
  <div class="nav-inner">
    <button type="button" class="nav-logo" (click)="scrollToSection('hero')">
      M<span>.</span>A
    </button>

    <nav class="nav-links">
      <button
        type="button"
        *ngFor="let link of links"
        (click)="scrollToSection(link.id)"
        [class.active]="activeSection === link.id || (link.id === 'skills' && activeSection === 'journey')"
      >
        {{ link.label }}
      </button>
    </nav>

    <div class="nav-status">
      <span class="pulse"></span>
      <span>Available for work</span>
    </div>

    <button type="button" class="nav-burger" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen" aria-label="Menu">
      <i [class]="isMenuOpen ? 'fa-solid fa-xmark' : 'fa-solid fa-bars'"></i>
    </button>
  </div>

  <div class="nav-mobile" [class.open]="isMenuOpen">
    <button type="button" *ngFor="let link of links" (click)="scrollToSection(link.id)">
      {{ link.label }}
    </button>
  </div>
</header>
