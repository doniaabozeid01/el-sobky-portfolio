<section id="work" class="work">
  <div class="container">
    <div class="work-head" appScrollReveal="from-bottom">
      <p class="section-label">03 — Selected Work</p>
      <span class="work-count">{{ projects.length }} projects</span>
    </div>

    <div class="work-body">
      <div class="work-stage" appScrollReveal="from-bottom">
        <div class="stage-copy">
          <p class="stage-index">{{ pad(active + 1) }}</p>
          <h3>{{ current.title }}</h3>
          <p class="stage-meta">{{ current.category }} · {{ current.year }}</p>
          <p class="stage-desc">{{ current.desc }}</p>
          <p class="stage-stack">{{ current.stack.join('  ·  ') }}</p>
          <button type="button" class="stage-cta" (click)="scrollToContact()">
            Discuss this project
            <i class="fa-solid fa-arrow-up-right"></i>
          </button>
        </div>

        <div class="stage-visual">
          <img [src]="current.image" [alt]="current.title" />
        </div>
      </div>

      <div class="work-index" appScrollReveal="from-bottom">
        <button
          type="button"
          class="index-row"
          *ngFor="let project of projects; let i = index"
          [attr.data-index]="i"
          #projectRow
          [class.active]="active === i"
          (click)="select(i)"
        >
          <span class="i-num">{{ pad(i + 1) }}</span>
          <span class="i-title">{{ project.title }}</span>
          <span class="i-cat">{{ project.category }}</span>
          <span class="i-year">{{ project.year }}</span>
        </button>
      </div>
    </div>
  </div>
</section>
