<section id="contact" class="contact">
  <div class="bg-word" aria-hidden="true">LET'S BUILD</div>

  <div class="container relative">
    <p class="section-label" appScrollReveal="from-bottom">06 — Contact</p>

    <div class="contact-grid">
      <div class="contact-left" appScrollReveal="flip-left">
        <h2>
          Got a project?<br />
          <span>Talk to me.</span>
        </h2>

        <div class="info-list">
          <div class="info-row">
            <span>Email</span>
            <a href="mailto:sobakimahmoud@gmail.com">sobakimahmoud@gmail.com</a>
          </div>
          <div class="info-row">
            <span>Phone</span>
            <a href="tel:+0201026545330">( +02 ) 01026545330</a>
          </div>
          <div class="info-row">
            <span>Location</span>
            <p>Maadi, Cairo, Egypt</p>
          </div>
          <div class="info-row">
            <span>Response</span>
            <p>Within 24h</p>
          </div>
        </div>

        <div class="socials">
          <a href="https://github.com/MahmoudAhmedElGelany" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
            <i class="fa-brands fa-github"></i>
          </a>
          <a href="https://www.linkedin.com/in/mahmoud-elsobky-757760283" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
            <i class="fa-brands fa-linkedin-in"></i>
          </a>
          <a href="https://www.instagram.com/mahmoud_elsobky2" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
            <i class="fa-brands fa-instagram"></i>
          </a>
          <a href="mailto:sobakimahmoud@gmail.com" aria-label="Email">
            <i class="fa-solid fa-envelope"></i>
          </a>
        </div>
      </div>

      <div class="contact-right" appScrollReveal="flip-right">
        <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" *ngIf="!formSent; else sentTpl">
          <label>
            Name
            <input type="text" formControlName="name" placeholder="Your name" />
            <small *ngIf="contactForm.get('name')?.touched && contactForm.get('name')?.invalid">Required</small>
          </label>
          <label>
            Email
            <input type="email" formControlName="email" placeholder="your@email.com" />
            <small *ngIf="contactForm.get('email')?.touched && contactForm.get('email')?.invalid">Valid email required</small>
          </label>
          <label>
            Phone
            <input type="text" formControlName="phone" placeholder="Phone number" />
            <small *ngIf="contactForm.get('phone')?.touched && contactForm.get('phone')?.invalid">Required</small>
          </label>
          <label>
            Country
            <input type="text" formControlName="country" placeholder="Country" />
            <small *ngIf="contactForm.get('country')?.touched && contactForm.get('country')?.invalid">Required</small>
          </label>
          <label class="full">
            Message
            <textarea rows="4" formControlName="message" placeholder="Tell me about your project..."></textarea>
            <small *ngIf="contactForm.get('message')?.touched && contactForm.get('message')?.invalid">Required</small>
          </label>

          <button type="submit" [disabled]="isSending">
            {{ isSending ? 'Sending...' : 'Send Message' }}
            <i class="fa-solid fa-arrow-up-right-from-square"></i>
          </button>

          <div class="status" *ngIf="errorMessage">
            <span class="bad">{{ errorMessage }}</span>
          </div>
        </form>

        <ng-template #sentTpl>
          <div class="sent">
            <div class="check">✓</div>
            <h3>Sent!</h3>
            <p>{{ successMessage || "I'll reply within 24 hours." }}</p>
          </div>
        </ng-template>
      </div>
    </div>
  </div>
</section>
