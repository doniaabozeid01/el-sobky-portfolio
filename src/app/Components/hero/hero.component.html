<section id="hero" class="hero">
  <div class="hero-glow hero-glow-l" aria-hidden="true"></div>
  <div class="hero-glow hero-glow-r" aria-hidden="true"></div>

  <div class="hero-inner">
    <div class="hero-copy">
      <p class="hero-eyebrow hero-anim" style="--d:0.1s">
        <span class="live"></span>
        Flutter Developer · Cairo
      </p>

      <h1 class="hero-title">
        <span class="hero-anim line" style="--d:0.18s">Building apps</span>
        <span class="hero-anim line" style="--d:0.28s">that feel fast,</span>
        <span class="hero-anim line accent" style="--d:0.38s">clean &amp; sharp.</span>
      </h1>

      <p class="hero-sub hero-anim" style="--d:0.5s">
        I’m <strong>Mahmoud Ahmed</strong> — shipping high-performance mobile,
        desktop &amp; web products with Flutter.
      </p>

      <div class="hero-actions hero-anim" style="--d:0.62s">
        <button type="button" class="btn-lime" (click)="scrollToSection('work')">
          See My Work
        </button>
        <a class="btn-outline" href="../../../assets/Mahmoud Ahmed Mohamed.pdf" target="_blank" rel="noopener noreferrer">
          View Resume
        </a>
      </div>

      <div class="hero-meta hero-anim" style="--d:0.75s">
        <div><strong>2+</strong><span>Years</span></div>
        <div><strong>13+</strong><span>Projects</span></div>
        <div class="socials">
          <a href="https://github.com/MahmoudAhmedElGelany" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
            <i class="fa-brands fa-github"></i>
          </a>
          <a href="https://www.linkedin.com/in/mahmoud-elsobky-757760283" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
            <i class="fa-brands fa-linkedin-in"></i>
          </a>
          <a href="mailto:sobakimahmoud@gmail.com" aria-label="Email">
            <i class="fa-solid fa-envelope"></i>
          </a>
        </div>
      </div>
    </div>

    <div class="hero-visual hero-anim-right">
      <!-- Orbital rings -->
      <div class="orbits" aria-hidden="true">
        <div class="ring ring-a">
          <span class="node"></span>
        </div>
        <div class="ring ring-b">
          <span class="node"></span>
        </div>
        <div class="ring ring-c">
          <span class="node"></span>
          <span class="node node-2"></span>
        </div>
      </div>

      <!-- Phones -->
      <div class="phones">
        <div class="phone phone-back">
          <div class="phone-chrome">
            <span class="phone-island"></span>
            <div class="phone-screen">
              <img src="../../../assets/projects/mockup mobile app.jpg" alt="Bubble Hope app" />
            </div>
          </div>
        </div>
        <div class="phone phone-front">
          <div class="phone-chrome">
            <span class="phone-island"></span>
            <div class="phone-screen">
              <img src="../../../assets/projects/mockup mobile app 2.jpg" alt="Bialjumla app" />
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="hero-marquee">
    <div class="hero-marquee-track">
      <span *ngFor="let repeat of [0, 1]">
        <ng-container *ngFor="let item of marquee">
          <span class="item">{{ item }}</span>
          <span class="star">✦</span>
        </ng-container>
      </span>
    </div>
  </div>
</section>
