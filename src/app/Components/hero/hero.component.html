<section id="hero" class="hero">
  <div class="hero-left">
    <div class="hero-top hero-enter" style="--d:0.1s">
      <span class="hero-index">Portfolio — 2026</span>
      <div class="hero-available">
        <span class="dot"></span>
        Available
      </div>
    </div>

    <div class="hero-mid">
      <div class="mask" style="--d:0.2s">
        <p class="hero-role">Flutter Developer · Cairo, Egypt</p>
      </div>
      <div class="mask" style="--d:0.28s">
        <h1 class="hero-name">MAHMOUD</h1>
      </div>
      <div class="mask" style="--d:0.38s">
        <h1 class="hero-name accent">AHMED</h1>
      </div>

      <div class="hero-divider hero-enter" style="--d:0.65s">
        <p>
          Crafting mobile, desktop &amp; web experiences with Flutter — clean code,
          solid architecture, pixel-perfect UI.
        </p>
        <div class="hero-socials">
          <a href="https://github.com/MahmoudAhmedElGelany" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
            <i class="fa-brands fa-github"></i>
          </a>
          <a href="https://www.linkedin.com/in/mahmoud-elsobky-757760283" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
            <i class="fa-brands fa-linkedin-in"></i>
          </a>
          <a href="mailto:sobakimahmoud@gmail.com" aria-label="Email">
            <i class="fa-solid fa-envelope"></i>
          </a>
        </div>
      </div>
    </div>

    <div class="hero-bottom hero-enter" style="--d:0.8s">
      <div class="hero-cta">
        <button type="button" class="btn-primary" (click)="scrollToSection('work')">
          See My Work <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </button>
        <a class="btn-ghost" href="../../../assets/Mahmoud Ahmed Mohamed.pdf" target="_blank" rel="noopener noreferrer">
          <i class="fa-solid fa-play"></i> Resume
        </a>
      </div>
      <div class="hero-stats">
        <div>
          <strong>2+</strong>
          <span>Years</span>
        </div>
        <div>
          <strong>13+</strong>
          <span>Projects</span>
        </div>
      </div>
    </div>
  </div>

  <div class="hero-right hero-enter-right">
    <div class="hero-glow" aria-hidden="true"></div>
    <div class="hero-ring ring-a" aria-hidden="true"></div>
    <div class="hero-ring ring-b" aria-hidden="true"></div>
    <div class="hero-figure">
      <img src="../../../assets/22.png" alt="Mahmoud Ahmed" />
    </div>
    <div class="hero-card float-in" style="--d:1s">
      <p>Speciality</p>
      <strong>Flutter <span>Developer</span></strong>
    </div>
    <div class="hero-pill float-in bob" style="--d:1.1s">
      <i class="fa-solid fa-code"></i>
      Clean Code
    </div>
    <div class="hero-strip" aria-hidden="true"></div>
  </div>

  <div class="hero-mobile-figure hero-enter" style="--d:0.4s">
    <img src="../../../assets/22.png" alt="Mahmoud Ahmed" />
  </div>

  <div class="hero-marquee">
    <div class="hero-marquee-track">
      <span *ngFor="let repeat of [0, 1]">
        <ng-container *ngFor="let item of marquee">
          <span class="item">{{ item }}</span>
          <span class="star">✦</span>
        </ng-container>
      </span>
    </div>
  </div>
</section>
