<section id="skills" class="skills">
  <div class="skills-services">
    <div class="container">
      <p class="section-label" appScrollReveal="from-bottom">04 — What I Build</p>
      <div class="services-grid">
        <article class="service" *ngFor="let s of services; let i = index" appScrollReveal="flip-up" [revealDelay]="i * 45">
          <div class="icon">
            <i [class]="s.icon"></i>
          </div>
          <h3>{{ s.label }}</h3>
          <p>{{ s.sub }}</p>
        </article>
      </div>
    </div>
  </div>

  <div class="skills-tools">
    <div class="container">
      <p class="tools-label">Tools &amp; Technologies</p>
      <div class="tools-wrap">
        <span *ngFor="let t of tools; let i = index" appScrollReveal="spin" [revealDelay]="i * 40">{{ t }}</span>
      </div>
    </div>
  </div>
</section>
